name: make build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9]

    steps:
    - uses: actions/checkout@v2
# first set up python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
# then execute the actual build process
    - name: Install moptipy from github
      run: |
        cd /home/runner/work/oa_data/
        mkdir -p ./build
        python "./oa_data/scripts/build_github_page.py" "./oa_data/" "./build/"
# prevent jekyll
    - name: prevent jekyll
      run: touch /home/runner/work/oa_data/build/.nojekyll
# deploy to github pages
    - name: deploy documentation
      uses: JamesIves/github-pages-deploy-action@4.1.4
      with:
        branch: gh-pages
        folder: /home/runner/work/oa_data/build/
        single-commit: true

